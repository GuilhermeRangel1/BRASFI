services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin123}
      MYSQL_DATABASE: ${DB_NAME:-BRASFI}
    ports:
      - "${DB_LOCAL_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql

  webapp:
    build: ./webapp
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-BRASFI}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      DDL_AUTO: ${DDL_AUTO:-update}
      SHOW_SQL: ${SHOW_SQL:-true}
      FORMAT_SQL: ${FORMAT_SQL:-true}
      HIBERNATE_SQL_LOG_LEVEL: ${HIBERNATE_SQL_LOG_LEVEL:-DEBUG}
      HIBERNATE_BINDER_LOG_LEVEL: ${HIBERNATE_BINDER_LOG_LEVEL:-TRACE}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8080}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@brasfi.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_CPF: ${ADMIN_CPF:-00000000000}
      ALLOW_PRIVILEGED_REGISTRATION: ${ALLOW_PRIVILEGED_REGISTRATION:-false}
    ports:
      - "${APP_PORT:-8080}:8080"
    container_name: ${APP_CONTAINER_NAME:-webapp}

  frontend:
    build: ./frontend
    depends_on:
      - webapp
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    container_name: ${FRONTEND_CONTAINER_NAME:-brasfi-frontend}

volumes:
  db_data:
